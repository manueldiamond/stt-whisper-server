services:
  stt-whisper-server:
    build: .
    container_name: stt-whisper-server
    restart: unless-stopped
    ports:
      - "5279:5279"
    environment:
      # MODEL_SIZE is legacy fallback. DEFAULT_MODEL is used when client does not send model=...
      MODEL_SIZE: ${MODEL_SIZE:-base}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-base}
      PRELOAD_MODEL: ${PRELOAD_MODEL:-}
      ALLOWED_MODELS: ${ALLOWED_MODELS:-tiny,tiny.en,base,base.en,small,small.en,medium,medium.en,large-v1,large-v2,large-v3,large,distil-small.en,distil-medium.en,distil-large-v2,distil-large-v3,distil-large-v3.5,large-v3-turbo,turbo}
      DEVICE: ${DEVICE:-cpu}
      COMPUTE_TYPE: ${COMPUTE_TYPE:-int8}
      LANGUAGE: ${LANGUAGE:-en}
      BEAM_SIZE: ${BEAM_SIZE:-1}
      VAD_FILTER: ${VAD_FILTER:-true}
      VAD_MIN_SILENCE_DURATION_MS: ${VAD_MIN_SILENCE_DURATION_MS:-500}
      MAX_CONCURRENT_TRANSCRIPTIONS: ${MAX_CONCURRENT_TRANSCRIPTIONS:-3}
      MODEL_NUM_WORKERS: ${MODEL_NUM_WORKERS:-3}
      TMP_DIR: ${TMP_DIR:-/dev/shm}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Optional. Set this in a private .env file, not in git.
      STT_API_TOKEN: ${STT_API_TOKEN:-}
    volumes:
      - whisper-models:/models

volumes:
  whisper-models:
